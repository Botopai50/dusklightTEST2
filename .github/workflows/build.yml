name: Build Windows and Android Manual

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Branch, tag or commit to build
        required: true
        default: agent/celshade-mod
        type: string

permissions:
  contents: read

concurrency:
  group: desktop-android-manual-${{ inputs.source_ref }}
  cancel-in-progress: true

env:
  CMAKE_BUILD_PARALLEL_LEVEL: '4'
  DUSK_ENABLE_SENTRY_NATIVE: 'OFF'
  SCCACHE_GHA_ENABLED: 'true'
  RUSTC_WRAPPER: 'sccache'

jobs:
  build-windows-x64:
    name: Windows x64 + Shipwright Celshade
    runs-on: windows-latest
    timeout-minutes: 120
    env:
      VCPKG_ROOT: C:\vcpkg

    steps:
      - name: Checkout selected source
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Show selected revision
        shell: pwsh
        run: |
          Write-Host "Requested source: ${{ inputs.source_ref }}"
          git status --short --branch
          git rev-parse HEAD

      - name: Enable Visual Studio environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Restore VCPKG_ROOT
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_ENV -Value 'VCPKG_ROOT=C:\vcpkg'

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Install build dependencies
        shell: pwsh
        run: |
          choco install ninja --no-progress -y
          vcpkg install freetype:x64-windows zstd:x64-windows

      - name: Configure CMake and patch Aurora
        shell: pwsh
        run: |
          cmake --preset x-windows-ci-msvc `
            -DDUSK_ENABLE_CODE_MODS=ON `
            -DDUSK_ENABLE_SHIPWRIGHT_CELSHADE=ON `
            -DDUSK_ENABLE_SENTRY_NATIVE=OFF

      - name: Verify integrated shader patch
        shell: pwsh
        run: |
          $gx = 'extern/aurora/lib/gx/gx.hpp'
          $shader = 'extern/aurora/lib/gx/shader.cpp'

          if (-not (Select-String -Path $gx -Pattern 'DUSKLIGHT_SHIPWRIGHT_CELSHADE_PER_PIXEL' -Quiet)) {
            throw "Per-pixel toon-lighting marker was not applied to $gx"
          }
          if (-not (Select-String -Path $shader -Pattern 'DUSKLIGHT_SHIPWRIGHT_CELSHADE_BEGIN' -Quiet)) {
            throw "Material-integrated toon-lighting marker was not applied to $shader"
          }

          Write-Host 'Aurora contains the integrated Shipwright-style celshade patch.'

      - name: Build and install Windows
        shell: pwsh
        run: |
          $log = 'windows-build.log'
          & cmake --build --preset x-windows-ci-msvc --parallel 4 *>&1 | Out-File -FilePath $log -Encoding utf8
          $result = $LASTEXITCODE

          if ($result -ne 0) {
            Write-Host '========== WINDOWS BUILD FAILURE (LAST 300 LINES) =========='
            Get-Content $log -Tail 300
            Write-Host '============================================================'
            exit $result
          }

          Write-Host '========== WINDOWS BUILD SUCCESS (LAST 100 LINES) ========='
          Get-Content $log -Tail 100

      - name: Upload Windows build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: shipwright-celshade-windows-log-${{ github.run_number }}
          path: windows-build.log
          if-no-files-found: warn
          retention-days: 14

      - name: Verify installed Windows game
        shell: pwsh
        run: |
          $executables = Get-ChildItem 'build/install' -Filter '*.exe' -File
          if ($executables.Count -eq 0) {
            Write-Host 'Install directory contents:'
            Get-ChildItem 'build/install' -Recurse | Format-Table FullName, Length
            throw 'No Dusklight Windows executable was installed.'
          }
          $executables | Format-Table Name, Length

      - name: Create Windows portable ZIP
        shell: pwsh
        run: |
          $zip = 'dusklight-shipwright-celshade-windows-x64.zip'
          if (Test-Path $zip) {
            Remove-Item $zip -Force
          }
          Compress-Archive -Path 'build/install/*' -DestinationPath $zip -CompressionLevel Optimal

      - name: Upload Windows build
        uses: actions/upload-artifact@v7
        with:
          name: dusklight-shipwright-celshade-windows-x64-${{ github.run_number }}
          path: dusklight-shipwright-celshade-windows-x64.zip
          if-no-files-found: error
          retention-days: 14

  build-android-arm64:
    name: Android ARM64 + Shipwright Celshade
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      ANDROID_NDK_VERSION: '29.0.14206865'

    steps:
      - name: Checkout selected source
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Show selected revision
        run: |
          echo "Requested source: ${{ inputs.source_ref }}"
          git status --short --branch
          git rev-parse HEAD

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK and NDK
        run: sdkmanager "platforms;android-36" "build-tools;36.1.0" "ndk;${ANDROID_NDK_VERSION}"

      - name: Install Rust Android target
        run: |
          rustup toolchain install stable
          rustup target add aarch64-linux-android

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Configure Android CMake and patch Aurora
        run: |
          cmake --preset x-android-ci-arm64 \
            -DDUSK_ENABLE_SHIPWRIGHT_CELSHADE=ON \
            -DDUSK_ENABLE_SENTRY_NATIVE=OFF

      - name: Verify integrated shader patch
        run: |
          grep -q 'DUSKLIGHT_SHIPWRIGHT_CELSHADE_PER_PIXEL' extern/aurora/lib/gx/gx.hpp
          grep -q 'DUSKLIGHT_SHIPWRIGHT_CELSHADE_BEGIN' extern/aurora/lib/gx/shader.cpp
          echo 'Aurora contains the integrated Shipwright-style celshade patch.'

      - name: Build Android native library and bundled mods
        run: |
          set -o pipefail
          {
            cmake --build --preset x-android-ci-arm64 --target dusklight --parallel 4
            cmake --build --preset x-android-ci-arm64 --target dusklight_mods --parallel 4
          } 2>&1 | tee android-build.log

      - name: Upload Android build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: shipwright-celshade-android-log-${{ github.run_number }}
          path: android-build.log
          if-no-files-found: warn
          retention-days: 14

      - name: Stage Android JNI library
        env:
          ANDROID_STAGE_ABIS: arm64-v8a
        run: platforms/android/scripts/stage-jni-libs.sh

      - name: Build Android APK
        working-directory: platforms/android
        run: ./gradlew :app:assembleRelease --rerun-tasks

      - name: Verify and stage Android APK
        run: |
          set -euxo pipefail
          APK='platforms/android/app/build/outputs/apk/release/app-arm64-v8a-release-unsigned.apk'
          test -s "$APK"
          mkdir -p upload/android upload/sdk
          cp "$APK" upload/android/dusklight-shipwright-celshade-arm64-v8a.apk
          cp build/*/stub-android-*.so upload/sdk/
          find upload -maxdepth 3 -type f -print

      - name: Upload Android build
        uses: actions/upload-artifact@v7
        with:
          name: dusklight-shipwright-celshade-android-arm64-${{ github.run_number }}
          path: upload/
          if-no-files-found: error
          retention-days: 14
