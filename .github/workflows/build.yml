name: Build BOTW Visual Suite Windows and Android

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Branch, tag or commit to build
        required: true
        default: agent/celshade-mod
        type: string

permissions:
  contents: read

concurrency:
  group: botw-suite-manual-${{ inputs.source_ref }}
  cancel-in-progress: true

env:
  CMAKE_BUILD_PARALLEL_LEVEL: '4'
  DUSK_ENABLE_SENTRY_NATIVE: 'OFF'
  SCCACHE_GHA_ENABLED: 'true'
  RUSTC_WRAPPER: 'sccache'

jobs:
  build-windows-x64:
    name: Windows x64 + BOTW Visual Suite v2
    runs-on: windows-latest
    timeout-minutes: 120
    env:
      VCPKG_ROOT: C:\vcpkg

    steps:
      - name: Checkout selected source
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Show selected revision
        shell: pwsh
        run: |
          Write-Host "Requested source: ${{ inputs.source_ref }}"
          git status --short --branch
          git rev-parse HEAD

      - name: Enable Visual Studio environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Restore VCPKG_ROOT
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_ENV -Value 'VCPKG_ROOT=C:\vcpkg'

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Install build dependencies
        shell: pwsh
        run: |
          choco install ninja --no-progress -y
          vcpkg install freetype:x64-windows zstd:x64-windows

      - name: Configure BOTW visual suite
        shell: pwsh
        run: |
          cmake --preset x-windows-ci-msvc `
            -DDUSK_ENABLE_CODE_MODS=ON `
            -DDUSK_ENABLE_SHIPWRIGHT_CELSHADE=ON `
            -DDUSK_ENABLE_BOTW_VISUAL_SUITE=ON `
            -DDUSK_ENABLE_SENTRY_NATIVE=OFF

      - name: Verify BOTW renderer transforms
        shell: pwsh
        run: |
          $checks = @(
            @{ Path = 'extern/aurora/lib/gx/gx.hpp'; Marker = 'DUSKLIGHT_SHIPWRIGHT_CELSHADE_PER_PIXEL' },
            @{ Path = 'extern/aurora/lib/gx/shader.cpp'; Marker = 'DUSKLIGHT_SHIPWRIGHT_CELSHADE_BEGIN' },
            @{ Path = 'mods/shadow_mod/src/mod.cpp'; Marker = 'DUSKLIGHT_BOTW_SHADOW_PRESET' },
            @{ Path = 'mods/shadow_mod/res/shadow.wgsl'; Marker = 'DUSKLIGHT_BOTW_COLORED_SHADOW' },
            @{ Path = 'mods/botw_visual_mod/res/botw_visual.wgsl'; Marker = 'DUSKLIGHT_BOTW_WGSL_PORTABILITY' }
          )
          foreach ($check in $checks) {
            if (-not (Select-String -Path $check.Path -Pattern $check.Marker -Quiet)) {
              throw "Required BOTW marker '$($check.Marker)' was not applied to $($check.Path)"
            }
          }
          Write-Host 'All BOTW renderer and projected-shadow transforms are present.'

      - name: Build and install Windows
        shell: pwsh
        run: |
          $log = 'windows-build.log'
          & cmake --build --preset x-windows-ci-msvc --parallel 4 *>&1 | Out-File -FilePath $log -Encoding utf8
          $result = $LASTEXITCODE

          if ($result -ne 0) {
            Write-Host '========== WINDOWS BUILD FAILURE (LAST 400 LINES) =========='
            Get-Content $log -Tail 400
            Write-Host '============================================================'
            exit $result
          }

          Write-Host '========== WINDOWS BUILD SUCCESS (LAST 120 LINES) ========='
          Get-Content $log -Tail 120

      - name: Upload Windows build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: botw-suite-v2-windows-log-${{ github.run_number }}
          path: windows-build.log
          if-no-files-found: warn
          retention-days: 14

      - name: Verify installed Windows game and mods
        shell: pwsh
        run: |
          $executables = Get-ChildItem 'build/install' -Filter '*.exe' -File
          if ($executables.Count -eq 0) {
            Get-ChildItem 'build/install' -Recurse | Format-Table FullName, Length
            throw 'No Dusklight Windows executable was installed.'
          }

          $visualMods = Get-ChildItem 'build/install' -Recurse -File | Where-Object {
            $_.Name -match 'botw_visual_mod|shadow_mod'
          }
          if (($visualMods | Where-Object Name -Match 'botw_visual_mod').Count -eq 0) {
            Get-ChildItem 'build/install' -Recurse | Format-Table FullName, Length
            throw 'BOTW visual-suite mod was not installed.'
          }
          if (($visualMods | Where-Object Name -Match 'shadow_mod').Count -eq 0) {
            Get-ChildItem 'build/install' -Recurse | Format-Table FullName, Length
            throw 'Projected-shadow mod was not installed.'
          }

          $executables | Format-Table Name, Length
          $visualMods | Format-Table FullName, Length

      - name: Create Windows portable ZIP
        shell: pwsh
        run: |
          $zip = 'dusklight-botw-visual-suite-v2-windows-x64.zip'
          if (Test-Path $zip) {
            Remove-Item $zip -Force
          }
          Compress-Archive -Path 'build/install/*' -DestinationPath $zip -CompressionLevel Optimal

      - name: Upload Windows build
        uses: actions/upload-artifact@v7
        with:
          name: dusklight-botw-visual-suite-v2-windows-x64-${{ github.run_number }}
          path: dusklight-botw-visual-suite-v2-windows-x64.zip
          if-no-files-found: error
          retention-days: 14

  build-android-arm64:
    name: Android ARM64 + BOTW Visual Suite v2
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      ANDROID_NDK_VERSION: '29.0.14206865'
      ANDROID_BUILD_TOOLS_VERSION: '36.1.0'

    steps:
      - name: Checkout selected source
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Show selected revision
        run: |
          echo "Requested source: ${{ inputs.source_ref }}"
          git status --short --branch
          git rev-parse HEAD

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK and NDK
        run: sdkmanager "platforms;android-36" "build-tools;${ANDROID_BUILD_TOOLS_VERSION}" "ndk;${ANDROID_NDK_VERSION}"

      - name: Install Rust Android target
        run: |
          rustup toolchain install stable
          rustup target add aarch64-linux-android

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Configure BOTW visual suite for Android
        run: |
          cmake --preset x-android-ci-arm64 \
            -DDUSK_ENABLE_CODE_MODS=ON \
            -DDUSK_ENABLE_SHIPWRIGHT_CELSHADE=ON \
            -DDUSK_ENABLE_BOTW_VISUAL_SUITE=ON \
            -DDUSK_ENABLE_SENTRY_NATIVE=OFF

      - name: Verify BOTW renderer transforms
        run: |
          set -euxo pipefail
          grep -q 'DUSKLIGHT_SHIPWRIGHT_CELSHADE_PER_PIXEL' extern/aurora/lib/gx/gx.hpp
          grep -q 'DUSKLIGHT_SHIPWRIGHT_CELSHADE_BEGIN' extern/aurora/lib/gx/shader.cpp
          grep -q 'DUSKLIGHT_BOTW_SHADOW_PRESET' mods/shadow_mod/src/mod.cpp
          grep -q 'DUSKLIGHT_BOTW_COLORED_SHADOW' mods/shadow_mod/res/shadow.wgsl
          grep -q 'DUSKLIGHT_BOTW_WGSL_PORTABILITY' mods/botw_visual_mod/res/botw_visual.wgsl
          echo 'All BOTW renderer and projected-shadow transforms are present.'

      - name: Build Android native library and bundled mods
        run: |
          set -o pipefail
          {
            cmake --build --preset x-android-ci-arm64 --target dusklight --parallel 4
            cmake --build --preset x-android-ci-arm64 --target dusklight_mods --parallel 4
          } 2>&1 | tee android-build.log

      - name: Verify Android bundled mods
        run: |
          set -euxo pipefail
          find build -type f -name 'botw_visual_mod.dusk' -print -quit | grep -q .
          find build -type f -name 'shadow_mod.dusk' -print -quit | grep -q .
          find build -type f \( -name 'botw_visual_mod.dusk' -o -name 'shadow_mod.dusk' \) -print

      - name: Upload Android build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: botw-suite-v2-android-log-${{ github.run_number }}
          path: android-build.log
          if-no-files-found: warn
          retention-days: 14

      - name: Stage Android JNI library
        env:
          ANDROID_STAGE_ABIS: arm64-v8a
        run: platforms/android/scripts/stage-jni-libs.sh

      - name: Build unsigned Android APK
        working-directory: platforms/android
        run: ./gradlew :app:assembleRelease --rerun-tasks

      - name: Align, sign and verify Android APK
        run: |
          set -euxo pipefail

          APK_DIR='platforms/android/app/build/outputs/apk/release'
          UNSIGNED_APK="$(find "$APK_DIR" -maxdepth 1 -type f -name '*arm64-v8a*release*unsigned*.apk' -print -quit)"
          if [ -z "$UNSIGNED_APK" ]; then
            UNSIGNED_APK="$(find "$APK_DIR" -maxdepth 1 -type f -name '*release*unsigned*.apk' -print -quit)"
          fi
          test -n "$UNSIGNED_APK"
          test -s "$UNSIGNED_APK"

          BUILD_TOOLS="$ANDROID_HOME/build-tools/$ANDROID_BUILD_TOOLS_VERSION"
          ZIPALIGN="$BUILD_TOOLS/zipalign"
          APKSIGNER="$BUILD_TOOLS/apksigner"
          KEYSTORE="$RUNNER_TEMP/dusklight-ci.keystore"
          ALIGNED_APK="$RUNNER_TEMP/dusklight-aligned.apk"
          SIGNED_APK="$RUNNER_TEMP/dusklight-botw-visual-suite-v2-arm64-v8a-signed.apk"

          test -x "$ZIPALIGN"
          test -x "$APKSIGNER"

          keytool -genkeypair -noprompt \
            -keystore "$KEYSTORE" \
            -storepass android \
            -keypass android \
            -alias dusklight \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname 'CN=Dusklight BOTW Suite Test Build,O=Botopai50,C=BR'

          "$ZIPALIGN" -f -p 4 "$UNSIGNED_APK" "$ALIGNED_APK"
          "$APKSIGNER" sign \
            --ks "$KEYSTORE" \
            --ks-key-alias dusklight \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out "$SIGNED_APK" \
            "$ALIGNED_APK"

          "$APKSIGNER" verify --verbose --print-certs "$SIGNED_APK"

          mkdir -p upload/android upload/sdk
          cp "$SIGNED_APK" upload/android/dusklight-botw-visual-suite-v2-arm64-v8a-signed.apk
          cp build/*/stub-android-*.so upload/sdk/
          find upload -maxdepth 3 -type f -print

      - name: Upload signed Android build
        uses: actions/upload-artifact@v7
        with:
          name: dusklight-botw-visual-suite-v2-android-arm64-signed-${{ github.run_number }}
          path: upload/
          if-no-files-found: error
          retention-days: 14
